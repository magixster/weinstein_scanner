name: Hourly Squeeze Paper Trader

on:
  schedule:
    # Runs at 15 past every hour, Monday to Friday
    - cron: '15 * * * 1-5'
  workflow_dispatch: # Allows you to test it manually

jobs:
  trade:
    runs-on: ubuntu-latest
    
    # --- CHANGE 1: Give the bot permission to save logs ---
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        # --- CHANGE 2: Added 'pytz' for IST conversion ---
        run: |
          pip install pandas numpy yfinance python-telegram-bot pytz

      - name: Run Multi-Market Trader
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH: ${{ github.workspace }}
        run: python squeeze/squeeze_bot.py

      # --- CHANGE 3: Save and Push all market logs ---
      - name: Save Trade Logs
        run: |
          git config --global user.name "Squeeze-Bot-Trader"
          git config --global user.email "bot@github.com"
          
          # Add all JSON files in the logs directory
          git add squeeze/logs/*.json
          
          # [skip ci] prevents the bot from triggering another run when it saves
          git commit -m "Update Market Logs (IST/Pairwise) [skip ci]" || echo "No changes to commit"
          git push
