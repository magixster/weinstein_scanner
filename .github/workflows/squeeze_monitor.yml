name: Hourly Squeeze Monitor

on:
  schedule:
    # Changed from 0 to 14 to avoid peak traffic delays
    - cron: '14 * * * 1-5' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Prevents a single run from hanging for hours
    timeout-minutes: 15 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # Updated to v4 for better reliability

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas numpy yfinance python-telegram-bot

      - name: Run Squeeze Monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH: ${{ github.workspace }}
        run: python squeeze/squeeze_bot.py
