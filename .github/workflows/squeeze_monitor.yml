name: Hourly Squeeze Monitor

on:
  schedule:
    - cron: '0 * * * 1-5' # Hourly, Mon-Fri
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install pandas numpy yfinance python-telegram-bot

      - name: Run Squeeze Monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # CRITICAL: This allows the script to find tickers.py in the root
          PYTHONPATH: ${{ github.workspace }}
        run: python Squeeze_momentum/squeeze_bot.py
