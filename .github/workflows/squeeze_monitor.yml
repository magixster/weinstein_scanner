name: Hourly Squeeze Paper Trader

on:
  schedule:
    # Runs at 15 past every hour, Monday to Friday
    - cron: '15 * * * 1-5'
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  trade:
    runs-on: ubuntu-latest
    
    # CRITICAL: This gives the Bot permission to save your Trade Logs
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas numpy yfinance python-telegram-bot pytz

      - name: Run Multi-Market Trader
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Ensures the script can find your 'tickers.py' in the root
          PYTHONPATH: ${{ github.workspace }}
        run: python squeeze/squeeze_bot.py

      - name: Save and Push Trade Logs
        # This step takes the updated .json files and pushes them to your repo
        run: |
          git config --global user.name "Squeeze-Bot-Trader"
          git config --global user.email "bot@github.com"
          # Add all logs in the logs directory
          git add squeeze/logs/*.json
          # Only commit if there are actually changes (new trades or exits)
          git commit -m "Automated Trade Log Update [skip ci]" || echo "No changes to commit"
          git push
