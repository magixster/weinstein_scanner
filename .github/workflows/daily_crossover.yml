name: Daily Forex Crossover Scan
on:
  schedule:
    - cron: '00 21 * * *' # 9:00 PM UTC = 02:30 AM IST (Next Day)
  workflow_dispatch: # Manual trigger button

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install yfinance pandas python-telegram-bot
      - name: Run Crossover Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python crossover_scan.py
